name: Release

# Triggert bei Tag-Push vX.Y.Z (z. B. v0.2.0).
# Baut die signierten Installer auf Windows UND macOS parallel, erstellt/
# aktualisiert das GitHub-Release und lädt MSI + .msi.sig + DMG + .app.tar.gz
# + .sig + latest.json (mergt Einträge pro Plattform) hoch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: ''
          - platform: macos-latest
            rust-target: 'aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # whisper-rs-sys braucht LLVM 18 für bindgen (Version 19+ bricht).
      - name: Install LLVM 18 (Windows)
        if: matrix.platform == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: bun install

      # tauri-action baut, signiert, erstellt den GitHub-Release und lädt
      # die Installer + .sig + latest.json hoch. Bei Matrix-Jobs mergt es
      # die latest.json-Einträge pro Plattform automatisch.
      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dictatr ${{ github.ref_name }}"
          releaseBody: |
            Siehe [CHANGELOG](../../blob/master/docs/CHANGELOG.md).

            Installer: `Dictatr_*_x64_en-US.msi` (Windows), `Dictatr_*.dmg` (macOS).
            Installierte Dictatr-Instanzen aktualisieren sich automatisch beim nächsten Start.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
