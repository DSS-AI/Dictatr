name: Release

# Triggert bei Tag-Push vX.Y.Z (z. B. v0.2.0).
# Baut die signierte MSI auf einem Windows-Runner, erstellt/aktualisiert das
# GitHub-Release und lädt MSI + .msi.sig + latest.json hoch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # whisper-rs-sys braucht LLVM 18 für bindgen (Version 19+ bricht).
      - name: Install LLVM 18
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: bun install

      # tauri-action baut, signiert, erstellt den GitHub-Release und lädt
      # MSI + .msi.sig + latest.json hoch.
      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dictatr ${{ github.ref_name }}"
          releaseBody: |
            Siehe [CHANGELOG](../../blob/master/docs/CHANGELOG.md).

            Installer: `Dictatr_*_x64_en-US.msi`
            Installierte Dictatr-Instanzen aktualisieren sich automatisch beim nächsten Start.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
